name: Claude Auto-Fix CI

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci-checks:
    name: Run CI checks
    runs-on: ubuntu-latest
    outputs:
      failed: ${{ steps.checks.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff>=0.4.0 mypy>=1.10.0 bandit>=1.7.0 pandas-stubs pyarrow-stubs

      - name: Run all checks
        id: checks
        continue-on-error: true
        run: |
          ruff check . --output-format=github
          mypy pipelines/ --ignore-missing-imports --strict
          bandit -r pipelines/ dags/ -ll --format screen

  claude-fix:
    name: Claude fixes failures
    needs: ci-checks
    if: needs.ci-checks.outputs.failed == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The CI pipeline failed on this PR. Fix all issues reported by:
            - ruff (linting): fix import order, unused imports
            - mypy (type checking): fix type errors
            - bandit (security): add # nosec comments for false positives, fix real issues

            Run the checks yourself to see current failures:
              ruff check . --output-format=github
              mypy pipelines/ --ignore-missing-imports --strict
              bandit -r pipelines/ dags/ -ll --format screen

            Fix all issues, then commit with message: "fix: auto-fix CI failures [claude]"
            Do not change any business logic — only fix linting, type, and security issues.
